apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: tls
spec:
  rules:
    - host: tls.vmw.avidemo.fr
      secretName: cert1
      http:
        paths:
          - backend:
              serviceName: web-front-1
              servicePort: 80
            path: /v1
          - backend:
              serviceName: web-front-2
              servicePort: 80
            path: /v2
          - backend:
              serviceName: web-front-3
              servicePort: 80
            path: /v3